$kind: http-request
name: GET /applications/:id - should return 404 for unknown ID
description: Negative resource lookup test for an unknown application ID.
url: "{{baseUrl}}/applications/{{missingApplicationId}}"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_negative_not_found
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('GET /applications/:id - should return 404 for unknown ID', function () {
        pm.response.to.have.status(404);
      });
      pm.test('Contract - not found response should include standard error shape', function () {
        pm.expect(body.error).to.include.keys(['code', 'message', 'correlationId']);
      });
      pm.test('Business - unknown ID should return APPLICATION_NOT_FOUND', function () {
        pm.expect(body.error.code).to.eql('APPLICATION_NOT_FOUND');
      });
    language: text/javascript
order: 3000
