$kind: http-request
name: POST /applications - should return 400 for missing required fields
description: Negative validation test for a request missing required customer and consent fields.
url: "{{baseUrl}}/applications"
method: POST
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_negative_bad_payload
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "productType": "checking"
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('POST /applications - should return 400 for missing required fields', function () {
        pm.response.to.have.status(400);
      });
      pm.test('Contract - validation error should include standard error shape', function () {
        pm.expect(body.error).to.include.keys(['code', 'message', 'correlationId']);
      });
      pm.test('Business - missing customer payload should return VALIDATION_ERROR', function () {
        pm.expect(body.error.code).to.eql('VALIDATION_ERROR');
        pm.expect(body.error.message).to.include('customer');
      });
    language: text/javascript
order: 2000
