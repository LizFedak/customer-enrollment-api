$kind: http-request
name: GET /applications/:id - should verify approved state
description: Verifies that the E2E application is approved.
url: "{{baseUrl}}/applications/{{e2eApplicationId}}"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_e2e_verify
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('GET /applications/:id - should verify approved state', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Contract - verified application should include customer and consent objects', function () {
        pm.expect(body.data.customer).to.be.an('object');
        pm.expect(body.data.consent).to.be.an('object');
      });
      pm.test('Business - application should remain approved after verification read', function () {
        pm.expect(body.data.id).to.eql(pm.collectionVariables.get('e2eApplicationId'));
        pm.expect(body.data.status).to.eql('approved');
      });
    language: text/javascript
order: 5000
