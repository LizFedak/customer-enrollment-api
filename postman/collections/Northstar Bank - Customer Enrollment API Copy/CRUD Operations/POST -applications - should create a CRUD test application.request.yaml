$kind: http-request
name: POST /applications - should create a CRUD test application
description: Creates an application for CRUD-specific tests.
url: "{{baseUrl}}/applications"
method: POST
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_crud_create
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "productType": "savings",
      "initialDepositAmount": 800,
      "customer": {
        "firstName": "Casey",
        "lastName": "Lee",
        "dateOfBirth": "1993-06-22",
        "email": "{{dynamicEmail}}",
        "phone": "+1-555-0188",
        "taxIdLast4": "{{dynamicTaxIdLast4}}",
        "address": {
          "line1": "77 Union Station Road",
          "line2": "",
          "city": "Chicago",
          "state": "IL",
          "postalCode": "60606",
          "country": "US"
        }
      },
      "consent": {
        "acceptedTerms": true,
        "marketingOptIn": true
      }
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('POST /applications - should create a CRUD test application', function () {
        pm.response.to.have.status(201);
      });
      pm.test('Contract - create response should include required application fields', function () {
        pm.expect(body.data).to.include.keys(['id', 'status', 'productType', 'customer', 'consent']);
      });
      pm.test('Business - CRUD application should be a savings enrollment', function () {
        pm.expect(body.data.productType).to.eql('savings');
        pm.expect(body.data.status).to.eql('submitted');
      });
      pm.collectionVariables.set('crudApplicationId', body.data.id);
    language: text/javascript
order: 1000
