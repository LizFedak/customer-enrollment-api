$kind: http-request
name: PATCH /applications/:id/status - should update CRUD application status
description: Updates the CRUD test application status.
url: "{{baseUrl}}/applications/{{crudApplicationId}}/status"
method: PATCH
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_crud_status
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "status": "in-review",
      "reason": "Partner-submitted enrollment requires operations review."
    }
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('PATCH /applications/:id/status - should update CRUD application status', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Contract - status update should return full application envelope', function () {
        pm.expect(body).to.have.keys(['data', 'meta']);
        pm.expect(body.data).to.include.keys(['id', 'status', 'decisionSummary']);
      });
      pm.test('Business - CRUD application should move to in-review', function () {
        pm.expect(body.data.status).to.eql('in-review');
        pm.expect(body.data.id).to.eql(pm.collectionVariables.get('crudApplicationId'));
      });
    language: text/javascript
order: 4000
