$kind: http-request
name: GET /applications - should list applications with filters
description: Lists applications with status and product-type filters.
url: "{{baseUrl}}/applications?status=submitted&product-type=savings"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_crud_list
queryParams:
  status: submitted
  product-type: savings
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('GET /applications - should list applications with filters', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Contract - filtered list should include pagination metadata', function () {
        pm.expect(body.data).to.be.an('array');
        pm.expect(body.meta.limit).to.eql(25);
        pm.expect(body.meta.offset).to.eql(0);
      });
      pm.test('Business - each filtered application should be submitted savings when present', function () {
        body.data.forEach((application) => {
          pm.expect(application.status).to.eql('submitted');
          pm.expect(application.productType).to.eql('savings');
        });
      });
    language: text/javascript
order: 2000
