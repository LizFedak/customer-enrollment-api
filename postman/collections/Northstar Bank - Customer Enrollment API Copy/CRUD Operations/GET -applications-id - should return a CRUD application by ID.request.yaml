$kind: http-request
name: GET /applications/:id - should return a CRUD application by ID
description: Retrieves the CRUD test application by ID.
url: "{{baseUrl}}/applications/{{crudApplicationId}}"
method: GET
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_crud_get
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('GET /applications/:id - should return a CRUD application by ID', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Contract - detail response should include customer address', function () {
        pm.expect(body.data.customer).to.have.property('address');
        pm.expect(body.data.customer.address).to.include.keys(['line1', 'city', 'state', 'postalCode', 'country']);
      });
      pm.test('Business - detail ID should match the CRUD variable', function () {
        pm.expect(body.data.id).to.eql(pm.collectionVariables.get('crudApplicationId'));
      });
    language: text/javascript
order: 3000
