$kind: http-request
name: POST /applications - should create a new application and return 201
description: Creates a new customer enrollment application for the E2E workflow.
url: "{{baseUrl}}/applications"
method: POST
headers:
  x-api-key: "{{apiKey}}"
  x-correlation-id: corr_demo_postman_e2e_write
body:
  type: json
  content: |-
    {
      "productType": "savings",
      "initialDepositAmount": 800,
      "customer": {
        "firstName": "Casey",
        "lastName": "Lee",
        "dateOfBirth": "1993-06-22",
        "email": "{{dynamicEmail}}",
        "phone": "+1-555-0188",
        "taxIdLast4": "{{dynamicTaxIdLast4}}",
        "address": {
          "line1": "77 Union Station Road",
          "line2": "",
          "city": "Chicago",
          "state": "IL",
          "postalCode": "60606",
          "country": "US"
        }
      },
      "consent": {
        "acceptedTerms": true,
        "marketingOptIn": true
      }
    }
scripts:
  - type: afterResponse
    code: |-
      let expectedId = pm.response.json().data.id;
      pm.collectionVariables.set('e2eApplicationId', expectedId)
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
    language: text/javascript
order: 1000
