$kind: http-request
name: GET /health - should reject invalid API key with 401
description: Smoke check proving invalid API keys are rejected.
url: "{{baseUrl}}/health"
method: GET
headers:
  x-api-key: invalid-key
  x-correlation-id: corr_demo_postman_smoke_invalid_key
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      pm.test('GET /health - should reject invalid API key with 401', function () {
        pm.response.to.have.status(401);
      });
      pm.test('Contract - unauthorized response should include standard error shape', function () {
        pm.expect(body).to.have.property('error');
        pm.expect(body.error).to.include.keys(['code', 'message', 'correlationId']);
      });
      pm.test('Business - invalid key should return UNAUTHORIZED code', function () {
        pm.expect(body.error.code).to.eql('UNAUTHORIZED');
      });
    language: text/javascript
order: 3000
