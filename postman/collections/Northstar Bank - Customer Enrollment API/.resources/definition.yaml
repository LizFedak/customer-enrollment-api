$kind: collection
name: Northstar Bank - Customer Enrollment API
description: Northstar Bank uses the Customer Enrollment API to accept, review, and manage digital account enrollment applications across retail banking channels. It is consumed by mobile banking, branch-assisted onboarding, contact-center tools, and approved partner onboarding experiences that need a governed way to submit prospective customer information. The API exists in the Northstar Bank portfolio to standardize enrollment workflows, enforce consistent security controls, and make application status visible across internal and partner journeys.
variables:
  baseUrl: http://localhost:3000
  apiKey: demo-key
  applicationId: app_demo_1001
  reviewApplicationId: app_demo_1002
  approvedApplicationId: app_demo_1003
  missingApplicationId: app_demo_9999
  e2eApplicationId: ""
  crudApplicationId: ""
  dynamicEmail: demo.customer@northstarbank.example
  dynamicTaxIdLast4: "4821"
  requestTimestamp: ""
scripts:
  - type: http:beforeRequest
    code: |-
      const timestamp = new Date().toISOString();
      const suffix = Date.now().toString().slice(-6);
      const taxIdLast4 = String(1000 + (Number(suffix) % 9000));
      pm.collectionVariables.set('requestTimestamp', timestamp);
      pm.collectionVariables.set('dynamicEmail', `postman.demo.${suffix}@northstarbank.example`);
      pm.collectionVariables.set('dynamicTaxIdLast4', taxIdLast4);
      console.log(`[Northstar Bank] ${pm.info.requestName} -> ${pm.request.method} ${pm.request.url.toString()}`);
    language: text/javascript
  - type: http:afterResponse
    code: |-
      pm.test('Contract - response body should be valid JSON', function () {
        pm.expect(function () { pm.response.json(); }).to.not.throw();
      });

      pm.test('Contract - response should include a correlation ID', function () {
        const body = pm.response.json();
        const correlationId = body.meta && body.meta.correlationId ? body.meta.correlationId : (body.error && body.error.correlationId ? body.error.correlationId : body.correlationId);
        pm.expect(correlationId).to.be.a('string');
        pm.expect(correlationId).to.match(/^corr_demo_/);
      });
    language: text/javascript
